version: "3.8"

networks:
  cs2-network:
    name: cs2-network
    driver: bridge

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:
  mongo_data:
  airflow_postgres_data:

# -----------------------
# Shared Airflow Config
# -----------------------
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: ../v2_distributed/docker/infra.Dockerfile
  env_file:
    - ./.env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor

    # Airflow metadata DB
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow

    # Use YOUR RabbitMQ
    AIRFLOW__CELERY__BROKER_URL: pyamqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//

    # Result backend
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow

    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__PARALLELISM=8
    AIRFLOW__CELERY__WORKER_CONCURRENCY=2
    PYTHONPATH: /opt
    AIRFLOW_HOME: /opt/airflow

  volumes: []

  depends_on:
    - rabbitmq
    - airflow-postgres

  networks:
    - cs2-network

# -----------------------
# Services
# -----------------------
services:

  # -------- RabbitMQ --------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file:
      - ./.env
    networks:
      - cs2-network

  # -------- Redis (for your app) --------
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cs2-network

  # -------- App Postgres --------
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}   # your main DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../storage/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cs2-network

  # -------- Mongo --------
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cs2-network

  # -------- Airflow Postgres (separate!) --------
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - cs2-network

  # -------- Airflow Init --------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: 'true'
    command: db migrate

  # -------- Web UI --------
  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__BASE_URL: http://airflow-apiserver:8080
    depends_on:
      - airflow-init

  # -------- Scheduler --------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init

  # -------- Workers --------
  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    depends_on:
      - airflow-init

  # -------- Triggerer --------
  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    depends_on:
      - airflow-init
  # -------- Processor --------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    depends_on:
      - airflow-init
    restart: always