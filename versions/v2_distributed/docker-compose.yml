version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      - rabbitmq
      - redis
      - postgres
      - mongo
    environment:
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      MONGO_URI: mongodb://mongo:27017
    deploy:
    resources:
      limits:
        cpus: "1"
        memory: 1G
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data: