version: "3.11"
networks:
  cs2-network:
    external: true
services:
  worker:
    container_name: worker
    build:
      context: ..
      dockerfile: ./docker/worker.Dockerfile

    env_file:
      - ../infra/.env
    restart: unless-stopped
    volumes:
      - ./logs:/app/worker/logs
    networks:
      - cs2-network
